<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Music Habitat — Investor Portal</title>
<meta name="robots" content="noindex, nofollow" />
<style>
  html, body { margin: 0; padding: 0; background: #000000; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; background: #000000; }
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; color: #5C5C63; font-family: system-ui, sans-serif; font-size: 13px;
    letter-spacing: 1px; text-transform: uppercase; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="boot">Loading the Music Habitat portal…</div>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// =============================================================================
// MUSIC HABITAT — INVESTOR PORTAL · THE CIRCLE 35 (Friends & Family · 506(b))
// Mobile-first React. Teal = discovery/explore. Amber = commitment/money.
// Pure-black brand. Bold condensed display + refined body.
//
// SCOPE: F&F track, full 14-screen flow. Public/Accredited track is a later
//        clone where Offer/Path/Paper swap to "Coming Soon" + external link.
//
// GATE STUBS: login is front-end only. Demo creds: investor1 / password1.
//   // BACKEND HOOK: replace credential check with real auth.
//   // BACKEND HOOK: DocuSign API on e-sign (Page 10).
//   // BACKEND HOOK: payment submission (Page 11).
//   // BACKEND HOOK: Calendly embed/link (Page 13).
//
// NOTE: All securities figures render here per founder spec. Term sheet is
//   non-binding / discussion-only; offering is made solely via definitive docs.
//   Counsel owns final legal language. Persistent disclaimer in Paper/footer.
//
// TEAM PHOTOS: 11 headshots embedded as base64 (PHOTO_*). Avatar resolves
//   REFERRERS img keys -> embedded constants via PHOTO_MAP. Titles across
//   REFERRERS / EXEC_SUMMARY.leadership / READER_CONTENT.team governed by the
//   founder's current 11-person roster. Exec Summary kept lean (5 executives).
// =============================================================================


// ---- Design tokens ----------------------------------------------------------
const C = {
  bg: "#000000",
  card: "#0D0D0F",
  cardHi: "#141417",
  line: "#26262B",
  lineHi: "#33333A",
  text: "#FFFFFF",
  textDim: "#9A9AA2",
  textFaint: "#5C5C63",
  amber: "#EDB901",      // commitment / money — logo gold
  amberDim: "#8A6A24",
  teal: "#00C9DD",       // discovery / explore — logo teal
  tealDim: "#1F6E6E",
  green: "#34C759",
  red: "#FF4D4D",
};

const FONT_DISPLAY = '"Oswald", "Anton", system-ui, sans-serif'; // bold condensed
const FONT_BODY = '"Inter", system-ui, sans-serif';

// ---- Shared UI --------------------------------------------------------------

function Shell({ children, step, total = 14, onBack }) {
  return (
    <div style={{
      minHeight: "100vh", background: C.bg, color: C.text,
      fontFamily: FONT_BODY, maxWidth: 440, margin: "0 auto",
      position: "relative", overflowX: "hidden",
    }}>
      <TopBar step={step} total={total} onBack={onBack} />
      <div style={{ padding: "0 20px 120px" }}>{children}</div>
    </div>
  );
}

function TopBar({ step, total, onBack }) {
  return (
    <div style={{
      position: "sticky", top: 0, zIndex: 30, background: "rgba(0,0,0,0.92)",
      backdropFilter: "blur(10px)", borderBottom: `1px solid ${C.line}`,
      padding: "14px 20px", display: "flex", alignItems: "center", gap: 12,
    }}>
      {onBack ? (
        <button onClick={onBack} style={{
          background: "none", border: "none", color: C.textDim, fontSize: 22,
          cursor: "pointer", lineHeight: 1, padding: 0, width: 24,
        }}>‹</button>
      ) : <div style={{ width: 24 }} />}
      <Logo size={22} />
      {step ? (
        <span style={{ marginLeft: "auto", fontSize: 11, letterSpacing: 1.5,
          color: C.textFaint, fontFamily: FONT_DISPLAY, textTransform: "uppercase" }}>
          Step {step} / {total}
        </span>
      ) : null}
    </div>
  );
}

// BACKEND HOOK: set MH_LOGO_URL to a hosted PNG/SVG (e.g.
// "https://www.musichabitat.com/logo.svg") to override the inline mark below.
// When set, the Logo component renders the hosted image; otherwise the
// dependency-free inline SVG renders (crisp at any size, never 404s).
const MH_LOGO_URL = "";

function Logo({ size = 28, center }) {
  const h = Math.round(size * 1.05);
  const wrap = {
    display: "flex", alignItems: "center", gap: Math.round(size * 0.32),
    justifyContent: center ? "center" : "flex-start", width: center ? "100%" : "auto",
  };
  // Hosted asset override.
  if (MH_LOGO_URL) {
    return (
      <div style={wrap}>
        <img src={MH_LOGO_URL} alt="Music Habitat" height={h}
          style={{ height: h, width: "auto", display: "block" }} />
      </div>
    );
  }
  // Inline SVG: teal equalizer mark with an amber "habitat" arch + MUSIC HABITAT wordmark.
  const m = Math.round(size * 1.15); // mark square
  return (
    <div style={wrap}>
      <svg width={m} height={m} viewBox="0 0 32 32" aria-label="Music Habitat" role="img"
        style={{ display: "block", flexShrink: 0 }}>
        <rect x="4"  y="11" width="3" height="10" rx="1.5" fill={C.teal} />
        <rect x="9"  y="7"  width="3" height="18" rx="1.5" fill={C.teal} />
        <path d="M14 25 V13 a2.4 2.4 0 0 1 4.8 0 V25" fill="none" stroke={C.amber}
          strokeWidth="3" strokeLinecap="round" />
        <rect x="20" y="7"  width="3" height="18" rx="1.5" fill={C.teal} />
        <rect x="25" y="11" width="3" height="10" rx="1.5" fill={C.teal} />
      </svg>
      <span style={{ fontFamily: FONT_DISPLAY, fontWeight: 800,
        fontSize: Math.round(size * 0.62), letterSpacing: 1.5, lineHeight: 1,
        whiteSpace: "nowrap" }}>
        <span style={{ color: C.teal }}>MUSIC</span>
        <span style={{ color: C.amber }}> HABITAT</span>
      </span>
    </div>
  );
}

function H({ children, accent = C.text, size = 30, style }) {
  return (
    <h1 style={{
      fontFamily: FONT_DISPLAY, fontWeight: 700, textTransform: "uppercase",
      letterSpacing: 0.5, lineHeight: 1.05, fontSize: size, margin: "0 0 8px",
      color: accent, ...style,
    }}>{children}</h1>
  );
}

function Kicker({ children, color = C.amber }) {
  return (
    <div style={{
      fontFamily: FONT_DISPLAY, fontWeight: 600, letterSpacing: 3,
      textTransform: "uppercase", fontSize: 11, color, marginBottom: 10,
    }}>{children}</div>
  );
}

// Amber = commit. Teal = explore. Ghost = secondary.
function Btn({ children, onClick, variant = "amber", full = true, disabled }) {
  const styles = {
    amber: { bg: C.amber, fg: "#1A1206", border: "none" },
    teal:  { bg: "transparent", fg: C.teal, border: `1px solid ${C.tealDim}` },
    ghost: { bg: "transparent", fg: C.textDim, border: `1px solid ${C.line}` },
  }[variant];
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
      width: full ? "100%" : "auto", padding: "15px 22px",
      background: disabled ? C.cardHi : styles.bg, color: disabled ? C.textFaint : styles.fg,
      border: styles.border, borderRadius: 10, cursor: disabled ? "not-allowed" : "pointer",
      fontFamily: FONT_DISPLAY, fontWeight: 600, fontSize: 14, letterSpacing: 1,
      textTransform: "uppercase", transition: "opacity .15s", marginTop: 4,
    }}>{children}</button>
  );
}

function Card({ children, style, onClick, accent }) {
  return (
    <div onClick={onClick} style={{
      background: C.card, border: `1px solid ${C.line}`,
      borderTop: accent ? `2px solid ${accent}` : `1px solid ${C.line}`,
      borderRadius: 12, padding: 18, marginBottom: 14,
      cursor: onClick ? "pointer" : "default", ...style,
    }}>{children}</div>
  );
}

function Field({ label, value, onChange, type = "text", placeholder }) {
  return (
    <label style={{ display: "block", marginBottom: 14 }}>
      <span style={{ fontSize: 11, letterSpacing: 1.5, color: C.textDim,
        textTransform: "uppercase", fontFamily: FONT_DISPLAY }}>{label}</span>
      <input type={type} value={value} placeholder={placeholder}
        onChange={(e) => onChange?.(e.target.value)} style={{
          width: "100%", marginTop: 6, padding: "13px 14px", background: C.cardHi,
          border: `1px solid ${C.line}`, borderRadius: 9, color: C.text,
          fontSize: 15, fontFamily: FONT_BODY, outline: "none", boxSizing: "border-box",
        }} />
    </label>
  );
}

// Live countdown to the offering close (Sept 30, 2026).
function Countdown({ target = "2026-09-30T23:59:59" }) {
  const calc = () => {
    const ms = new Date(target).getTime() - Date.now();
    if (ms <= 0) return null;
    const d = Math.floor(ms / 86400000);
    const h = Math.floor((ms % 86400000) / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return { d, h, m, s };
  };
  const [t, setT] = useState(calc());
  useEffect(() => {
    const id = setInterval(() => setT(calc()), 1000);
    return () => clearInterval(id);
  }, []);
  if (!t) return (
    <span style={{ fontSize: 11, color: C.textFaint, fontFamily: FONT_DISPLAY,
      letterSpacing: 1, textTransform: "uppercase" }}>Offering closed</span>
  );
  const Seg = ({ v, l }) => (
    <div style={{ textAlign: "center", minWidth: 30 }}>
      <div style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 16, color: C.amber,
        fontVariantNumeric: "tabular-nums" }}>{String(v).padStart(2, "0")}</div>
      <div style={{ fontSize: 8, color: C.textFaint, letterSpacing: 1,
        textTransform: "uppercase", fontFamily: FONT_DISPLAY }}>{l}</div>
    </div>
  );
  return (
    <div>
      <div style={{ fontSize: 9, color: C.textFaint, letterSpacing: 1.5,
        textTransform: "uppercase", fontFamily: FONT_DISPLAY, marginBottom: 4 }}>
        Offering closes in
      </div>
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <Seg v={t.d} l="Days" /><span style={{ color: C.amberDim }}>:</span>
        <Seg v={t.h} l="Hrs" /><span style={{ color: C.amberDim }}>:</span>
        <Seg v={t.m} l="Min" /><span style={{ color: C.amberDim }}>:</span>
        <Seg v={t.s} l="Sec" />
      </div>
    </div>
  );
}

// Small Guardian badge mark (used inline on the F&F tile).
function BadgeMark({ size = 30 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 200 200" style={{ flexShrink: 0 }}>
      <defs>
        <linearGradient id="goldMini" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#F4D98A" /><stop offset="100%" stopColor="#9A7B2E" />
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="94" fill="#0A0A0C" stroke="url(#goldMini)" strokeWidth="6" />
      <circle cx="100" cy="100" r="74" fill="none" stroke="url(#goldMini)" strokeWidth="3" />
      <g transform="translate(100,86)">
        <rect x="-30" y="-4" width="7" height="12" rx="2" fill={C.teal} />
        <rect x="-18" y="-14" width="7" height="32" rx="2" fill="url(#goldMini)" />
        <rect x="-5" y="-24" width="11" height="52" rx="3" fill="#EDEDF0" />
        <rect x="12" y="-14" width="7" height="32" rx="2" fill="url(#goldMini)" />
        <rect x="24" y="-4" width="7" height="12" rx="2" fill={C.teal} />
      </g>
      <rect x="58" y="120" width="84" height="26" rx="4" fill="#1A1206" stroke="url(#goldMini)" strokeWidth="2" />
      <text x="100" y="138" textAnchor="middle" fill="url(#goldMini)" fontSize="15"
        letterSpacing="2" fontFamily={FONT_DISPLAY} fontWeight="700">XXXV</text>
    </svg>
  );
}

// =============================================================================

// =============================================================================

// Avatar: shows a headshot when available, else gradient initials. Team photos
// are bundled (PHOTO_*) and resolved via PHOTO_MAP; unknown keys fall back to
// PHOTO_BASE, then to gradient initials on load error.
function Avatar({ name, img, selected, size = 54, flat }) {
  const [failed, setFailed] = useState(false);
  const initials = name.split(" ").map((x) => x[0]).join("").slice(0, 2);
  const ring = selected ? `2px solid ${C.amber}` : `1px solid ${C.line}`;
  const m = flat ? 0 : "0 auto 10px";
  // Resolve the image source: embedded team photo > data/URL as-is > hosted.
  const resolveSrc = () => {
    if (!img) return "";
    if (PHOTO_MAP[img]) return PHOTO_MAP[img];
    if (img === "brandon.jpg" || /brandon/i.test(img)) return PHOTO_BRANDON;
    if (/^(data:|https?:)/.test(img)) return img;
    return PHOTO_BASE + img;
  };
  const src = resolveSrc();
  if (src && !failed) {
    return (
      <img src={src} alt={name} onError={() => setFailed(true)} style={{
        width: size, height: size, borderRadius: "50%", objectFit: "cover",
        margin: m, display: "block", border: ring, flexShrink: 0,
      }} />
    );
  }
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", margin: m, flexShrink: 0,
      background: `linear-gradient(135deg, ${C.tealDim}, ${C.amberDim})`,
      display: "flex", alignItems: "center", justifyContent: "center",
      fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: size * 0.33, color: "#fff",
      border: selected ? `2px solid ${C.amber}` : "none" }}>
      {initials}
    </div>
  );
}

// Full NDA text — single source for both the on-screen render and the download,
// so the displayed agreement and the saved copy are always identical.
function ndaClauses(trackLabel) {
  return [
    ["1. Parties",
      "This Non-Disclosure Agreement (the “Agreement”) is entered into by and between the undersigned prospective investor (the “Recipient”) and Music Habitat, Inc., a Montana corporation (the “Company”). The Recipient is the disclosing party's counterparty; the obligations of confidentiality under this Agreement are undertaken solely by the Recipient in favor of the Company."],
    ["2. Purpose",
      "The Company wishes to share certain confidential information with the Recipient so that the Recipient may evaluate a possible investment in connection with " + trackLabel + " (the “Purpose”). This Agreement governs the Recipient's use and protection of that information."],
    ["3. Confidential Information",
      "“Confidential Information” means all non-public information disclosed by the Company to the Recipient, in any form (oral, written, electronic, or visual), including but not limited to the Executive Summary, Pitch Deck, Business Plan, Financial Model and projections, Services documentation, the working prototype, term sheets, capitalization details, valuation, the existence and terms of any offering, and all other offering and legal documents — together with all notes, analyses, or materials the Recipient derives from them."],
    ["4. Recipient's Obligations",
      "The Recipient shall: (a) hold all Confidential Information in strict confidence; (b) use it solely for the Purpose and for no other use; (c) not disclose it to any third party without the Company's prior written consent; (d) limit access to advisors who need to know it for the Purpose and who are bound by confidentiality obligations at least as protective as those here, for whom the Recipient remains responsible; and (e) protect it using at least the same degree of care the Recipient uses for its own confidential information, and in no event less than a reasonable degree of care."],
    ["5. Exclusions",
      "Confidential Information does not include information that: (a) is or becomes publicly available through no act or omission of the Recipient; (b) was lawfully known to the Recipient without obligation of confidentiality before disclosure by the Company; (c) is lawfully received from a third party without restriction and without breach of any obligation; or (d) is independently developed by the Recipient without use of or reference to the Confidential Information."],
    ["6. Compelled Disclosure",
      "If the Recipient is required by law, regulation, or valid legal process to disclose any Confidential Information, the Recipient shall, to the extent legally permitted, give the Company prompt prior written notice so the Company may seek a protective order or other remedy, and shall disclose only that portion legally required."],
    ["7. No License; No Offer",
      "All Confidential Information remains the sole property of the Company. Nothing in this Agreement grants the Recipient any license or ownership right in the Confidential Information or any Company intellectual property. The Confidential Information does not constitute an offer to sell or a solicitation to buy any security; any investment is made solely pursuant to and in reliance on the Company's executed offering documents."],
    ["8. No Warranty",
      "The Confidential Information is provided “as is.” The Company makes no representation or warranty as to its accuracy or completeness in this Agreement, and the Recipient agrees that any such representations are made only, if at all, in the definitive offering documents."],
    ["9. Term & Return",
      "This Agreement and the Recipient's obligations survive for three (3) years from the date of acceptance. Upon the Company's written request, the Recipient shall promptly return or destroy all Confidential Information (including copies and derivatives) and, if requested, certify such destruction in writing."],
    ["10. Remedies",
      "The Recipient acknowledges that a breach of this Agreement may cause the Company irreparable harm for which monetary damages would be inadequate, and that the Company shall be entitled to seek injunctive and other equitable relief, in addition to any other remedies available at law, without the necessity of posting a bond."],
    ["11. Governing Law",
      "This Agreement is governed by the laws of the State of Montana, consistent with the Company's offering documents, without regard to its conflict-of-laws principles. The parties consent to the exclusive jurisdiction of the state and federal courts located in Montana for any matter not subject to arbitration under the offering documents."],
    ["12. Entire Agreement",
      "This Agreement is the entire understanding between the parties regarding the confidentiality of the Confidential Information and supersedes all prior discussions on that subject. It may be amended only in a writing signed by both parties. If any provision is held unenforceable, the remainder shall remain in full force. The Recipient's typed name below constitutes the Recipient's electronic signature."],
  ];
}

    : `<div class="sig"><div class="sigrow"><span class="signame">&nbsp;</span></div>
        <div class="siglbl">Recipient signature &nbsp;·&nbsp; Date</div></div>`;
  const html = `<!doctype html><html><head><meta charset="utf-8">

  p { margin: 0 0 8px; font-size: 12px; }
  .art { page-break-inside: avoid; }
  .sig { margin-top: 30px; page-break-inside: avoid; }
  .sigrow { border-bottom: 1px solid #333; min-height: 28px; max-width: 320px; }
  .signame { font-family: "Brush Script MT", "Segoe Script", cursive; font-size: 22px; }
  .siglbl { font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #888; margin-top: 6px; }
  .disc { font-size: 9px; color: #888; margin-top: 22px; border-top: 1px solid #ddd; padding-top: 10px; line-height: 1.4; }
  @media print { .noprint { display: none; } }
  .noprint { text-align:center; margin: 18px 0; }

</style></head><body>
<div class="noprint"><button onclick="window.print()">Save as PDF / Print</button></div>
<div class="mast"><span class="t">MUSIC</span><span class="g">HABITAT</span></div>
<div class="tag">Confidential</div>
<h1>Non-Disclosure Agreement</h1>
<div class="sub">A unilateral confidentiality agreement from the prospective investor (Recipient) to Music Habitat, Inc.</div>
${bodyHtml}
${sig}
<div class="disc">CONFIDENTIAL &amp; PROPRIETARY — NOT FOR DISTRIBUTION. © 2026 Music Habitat, Inc. This document is provided for the Recipient's records. Not legal advice; consult your own advisors.</div>
</body></html>`;
  const win = window.open("", "_blank");
  if (win) { win.document.open(); win.document.write(html); win.document.close(); }
  else {
    const blob = new Blob([html], { type: "text/html" });
    const u = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = u; a.download = "MusicHabitat_NDA.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(u), 1000);

// pen-on-paper handwriting script that reads like a real signature — from

function BrandonSignature() {

  }, []);

// =============================================================================
// PDFDocViewer — real PDF render with hosted-URL / data-URI hook
// =============================================================================
function PDFDocViewer({ docId, title, onBack }) {
  const src = DOC_SOURCES[pdfSourceKey(docId)] || "";

  return (
    <Shell onBack={onBack}>
      <div style={{ paddingTop: 16 }}>
        <Kicker>Official Document</Kicker>
        <H size={24}>{title}</H>
        <p style={{ color: C.textDim, fontSize: 13, margin: "6px 0 16px" }}>
          The complete, executed version. Pinch to zoom; scroll to page through.
        </p>
      </div>

      {src ? (
        <>
          {/* Real PDF render. <iframe> is the most broadly-compatible mobile
              path (iOS Safari + Chrome both page through native PDFs). */}
          <div style={{
            width: "100%", height: "70vh", minHeight: 420,
            border: `1px solid ${C.line}`, borderRadius: 12, overflow: "hidden",
            background: "#1a1a1a",
          }}>
            <iframe
              src={src + "#view=FitH"}
              title={title}
              style={{ width: "100%", height: "100%", border: "none" }}
            />
          </div>
          <Btn variant="amber" onClick={() => window.open(src, "_blank")}>
            Open / Download PDF
          </Btn>
        </>
      ) : (
        // No source wired yet — clean placeholder, not a broken frame.
        <Card style={{ textAlign: "center", padding: "40px 20px" }}>
          <div style={{
            aspectRatio: "8.5/11", maxWidth: 220, margin: "0 auto 20px",
            background: C.cardHi, border: `1px dashed ${C.lineHi}`, borderRadius: 8,
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <span style={{ color: C.textFaint, fontSize: 12, letterSpacing: 1,
              textTransform: "uppercase", fontFamily: FONT_DISPLAY }}>PDF</span>
          </div>
          <p style={{ color: C.textDim, fontSize: 14, lineHeight: 1.5, margin: "0 0 4px" }}>
            {title} renders here once the file is published.
          </p>
          <p style={{ color: C.textFaint, fontSize: 12 }}>
            {/* BACKEND HOOK: set DOC_SOURCES["{pdfSourceKey(docId)}"] */}
            Awaiting hosted PDF source — a generated summary is available below.
          </p>
          {/* Until the signed PDF is hosted, every investor doc still downloads:
              Exec Summary uses its rich generator; Term Sheet generates from terms. */}
          <div style={{ marginTop: 16 }}>
            <Btn variant="amber" onClick={() => {
              if (pdfSourceKey(docId) === "execsum") downloadExecSummaryPDF();
              else downloadTermSheetPDF();
            }}>Download PDF</Btn>
          </div>
        </Card>
      )}

      <Btn variant="ghost" onClick={onBack}>Back to Documents</Btn>
    </Shell>
  );
}

// =============================================================================
// downloadReaderDoc — generates a print-ready PDF from reader/VERBATIM content.
// If a hosted/executed PDF exists in DOC_SOURCES, that file opens instead.
// =============================================================================
function downloadReaderDoc(docId) {
  const key = resolveDocKey(docId);
  if (DOC_SOURCES[key]) { window.open(DOC_SOURCES[key], "_blank"); return; }

  const esc = (s) => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const V = VERBATIM[key];
  const R = READER_CONTENT[key];
  const src = V || R;
  if (!src) { return; }

  let bodyHtml = "";
  if (V) {
    bodyHtml += (V.meta || []).length
      ? `<table class="meta">${V.meta.map(([k, v]) => `<tr><td class="k">${esc(k)}</td><td>${esc(v)}</td></tr>`).join("")}</table>` : "";
    bodyHtml += V.articles.map(([h, ...paras]) =>
      `<div class="art"><h2>${esc(h)}</h2>${paras.map((p) => `<p>${esc(p)}</p>`).join("")}</div>`).join("");
  } else {
    bodyHtml += `<div class="intro">${esc(R.intro)}</div>`;
    bodyHtml += (R.sections || []).map((s) => {
      let inner = `<h2>${esc(s.h)}</h2>`;
      if (s.body) inner += `<p>${esc(s.body)}</p>`;
      if (s.list) inner += s.list.map(([t, d]) => `<div class="item"><b>${esc(t)}</b><p>${esc(d)}</p></div>`).join("");
      return `<div class="art">${inner}</div>`;
    }).join("");
    if (R.roster) bodyHtml += `<div class="art"><table class="meta">${R.roster.map(([n, role]) => `<tr><td><b>${esc(n)}</b></td><td style="text-align:right;color:#888">${esc(role)}</td></tr>`).join("")}</table></div>`;
    if (R.financials) bodyHtml += `<div class="art"><h2>${esc(R.financials.heading)}</h2><table class="grid"><tr>${R.financials.cols.map((c) => `<th>${esc(c)}</th>`).join("")}</tr>${R.financials.rows.map((r) => `<tr>${r.map((c, i) => `<td${i === 0 ? ' class="rl"' : ""}>${esc(c)}</td>`).join("")}</tr>`).join("")}</table></div>`;
    if (R.ask) bodyHtml += `<div class="art"><h2>${esc(R.ask.heading)}</h2><table class="grid">${R.ask.items.map((it) => `<tr><td class="rl">${esc(it[0])}</td><td>${esc(it[1])}</td><td>${esc(it[2])}</td></tr>`).join("")}</table></div>`;
  }

  const html = `<!doctype html><html><head><meta charset="utf-8">
<title>Music Habitat — ${esc(src.title)}</title>
<style>
  @page { margin: 48px; }

// =============================================================================
// InPortalDocReader — renders a READER_CONTENT or VERBATIM doc in-app.
// VERBATIM (full legal text) takes priority when present for a docId.
// =============================================================================
function InPortalDocReader({ docId, onBack }) {
  const key = resolveDocKey(docId);
  const V = VERBATIM[key];
  const D = READER_CONTENT[key];

  if (!V && !D) {
    return (
      <Shell onBack={onBack}>
        <div style={{ paddingTop: 60, textAlign: "center" }}>
          <div style={{ fontSize: 34 }}>📄</div>
          <H size={22}>Document</H>

          </p>
          <Btn variant="ghost" onClick={onBack}>Back</Btn>
        </div>
      </Shell>
    );
  }

  // ---- VERBATIM render (full article text) ----------------------------------
  if (V) {
    return (
      <Shell onBack={onBack}>
        <div style={{ paddingTop: 16 }}>
          <Kicker>{V.kicker}</Kicker>
          <H size={25}>{V.title}</H>

        {V.meta && (
          <Card style={{ padding: "6px 16px", marginTop: 8 }}>

                  fontSize: 11, fontFamily: FONT_DISPLAY }}>{k}</span>
                <span style={{ color: C.text, textAlign: "right", maxWidth: "62%" }}>{v}</span>
              </div>
            ))}
          </Card>

        {V.articles.map(([h, ...paras], i) => (
          <div key={i} style={{ marginTop: 18 }}>
            <div style={{ color: C.teal, fontFamily: FONT_DISPLAY, fontWeight: 600, fontSize: 13,
              letterSpacing: 0.5, marginBottom: 8, paddingBottom: 6,
              borderBottom: `1px solid ${C.line}` }}>{h}</div>
            {paras.map((p, j) => {
              const isWaiver = /KNOWINGLY|WAIVE|JURY TRIAL/.test(p) && p === p.toUpperCase();

  // ---- READER_CONTENT render (structured summary) ---------------------------

      {D.ask && (

            letterSpacing: 0.5, marginBottom: 8 }}>{D.ask.heading}</div>

          <Btn variant="amber" onClick={() => downloadReaderDoc(docId)}>Download PDF</Btn>
        )}

      </div>
    </Shell>
  );
}

function navArrow(side) {
  return {
    position: "absolute", top: "50%", transform: "translateY(-50%)",
    [side]: -4, width: 40, height: 40, borderRadius: "50%",
    background: "rgba(20,20,20,0.9)", border: `1px solid ${C.lineHi}`,

}

// =============================================================================
// DocViewer — routes a docId to the correct renderer.
// =============================================================================
function DocViewer({ docId, onBack }) {
  const key = resolveDocKey(docId);
  if (key === "prototype") return <PrototypeView onBack={onBack} />;
  // Term Sheet + Executive Summary → real PDF render path.
  if (PDF_RENDER_IDS.has(docId) || PDF_RENDER_IDS.has(key)) {
    const title = docId.startsWith("termsheet") || key === "term_sheet"
      ? "Term Sheet" : "Executive Summary";
    return <PDFDocViewer docId={docId} title={title} onBack={onBack} />;
  }
  // Everything else → in-portal reader (VERBATIM if present, else structured).
  return <InPortalDocReader docId={docId} onBack={onBack} />;
}

// BACKEND HOOK: DocuSign (or Adobe Sign) integration.
// Wire getDocusignSigningUrl() to your backend, which should create an envelope
// from the three templates and return an embedded recipient-view URL.
const DOCUSIGN = {
  enabled: false, // BACKEND HOOK: set true once envelope creation is wired
  // BACKEND HOOK: your server endpoint that returns { url } for the embedded signing view
  createEnvelopeEndpoint: "", // e.g. "https://api.musichabitat.com/docusign/envelope"
  documents: [
    { id: "safe", name: "SAFE Agreement" },
    { id: "warrant", name: "Warrant Agreement" },
    { id: "subscription", name: "Subscription Agreement & Questionnaire" },
  ],
};
async function getDocusignSigningUrl(docId, app) {
  // BACKEND HOOK: POST to DOCUSIGN.createEnvelopeEndpoint with investor + doc info,
  // return the embedded signing URL. Until wired, returns "" (demo handled in UI).
  if (!DOCUSIGN.enabled || !DOCUSIGN.createEnvelopeEndpoint) return "";
  try {
    const res = await fetch(DOCUSIGN.createEnvelopeEndpoint, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ docId, investor: app }),
    });
    const data = await res.json();
    return data.url || "";
  } catch { return ""; }
}

function Page10({ go, onBack, signed, setSigned, app }) {
  const docs = DOCUSIGN.documents;
  const signedCount = docs.filter((d) => signed[d.id]).length;

  const signOne = async (docId) => {

    // In the live integration, completion is confirmed via DocuSign Connect webhook.

  const [method, setMethod] = useState("wire");

  // ACH form state — investor's own bank details for an ACH debit (pull).
  const [ach, setAch] = useState({
    holder: app.fullName || "", acctType: "checking",
    routing: "", account: "", confirm: "", authorized: false,
  });
  const setA = (k) => (v) => setAch((s) => ({ ...s, [k]: v }));
  const routingValid = /^\d{9}$/.test(ach.routing);
  const accountValid = /^\d{4,17}$/.test(ach.account);
  const confirmMatch = ach.account.length > 0 && ach.account === ach.confirm;
  const achComplete = ach.holder.trim() && routingValid && accountValid && confirmMatch && ach.authorized;
  const [achSubmitted, setAchSubmitted] = useState(false);

  const submitAch = async () => {
    if (!achComplete) return;
    // BACKEND HOOK: tokenize + authorize via FUNDING.achProcessorEndpoint.
    // Do NOT send raw account numbers to a non-PCI/NACHA-compliant endpoint.
    setAchSubmitted(true);
  };
  const methods = [
    { id: "wire", icon: "🏦", label: "Wire Transfer", sub: "Voice-verified · same-day" },
    { id: "ach", icon: "💳", label: "ACH Transfer", sub: FUNDING.achEnabled ? "1–3 business days" : "Coming soon" },

              flex: 1, padding: "14px 6px", borderRadius: 12, cursor: disabled ? "default" : "pointer",

// -----------------------------------------------------------------------------
// A distinct raise from the Circle 35 (F&F · 506(b)). Key legal/structural
// differences, per the Investor Exposure Sequence and counsel-confirmed terms:
//
//   • EXEMPTION:  Rule 506(c) of Regulation D — general solicitation IS permitted,
//                 but EVERY purchaser must be an ACCREDITED investor whose status is
//                 VERIFIED by the issuer (third-party / documentary verification),
//                 not merely self-certified as under 506(b).
//   • INSTRUMENT: Priced Class B Preferred purchased DIRECTLY via a Stock Purchase
//                 & Transfer Agreement — NOT a SAFE. No valuation cap/discount
//                 mechanic; a stated price per share.
//   • NO WARRANT, NO GUARDIAN BADGE, NO "CIRCLE 35" FRAMING — those are F&F-only.

//                 Financial Model, Prototype), and most governance (Operating,
//                 Subscription + Questionnaire, Stockholders') are used in BOTH.

// F&F/Circle 35 commitment lane.
//

//          → pp_ack → pp_sign → pp_fund → pp_welcome

// PP2.5 — Q&A + AI Investor Assistant (Private · 506(c) framing)
// =============================================================================
function PPQA({ go, onBack }) {
  const cats = Object.keys(QA_PRIVATE);
  const [cat, setCat] = useState(cats[0]);
  const [open, setOpen] = useState(null);
  const [chat, setChat] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const scroller = useRef(null);

  useEffect(() => {
    if (scroller.current) scroller.current.scrollTop = scroller.current.scrollHeight;
  }, [chat, busy]);

  const ask = async (preset) => {
    const q = (typeof preset === "string" ? preset : input).trim();
    if (!q || busy) return;
    setInput("");
    const next = [...chat, { role: "user", content: q }];
    setChat(next);
    setBusy(true);
    try {
      const sys = "You are the Music Habitat Investor Assistant for the Private Offering (Rule 506(c) of Regulation D). Answer concisely, factually, and only about Music Habitat, StageBid, and this offering. Key terms: this is a PRICED round — accredited investors purchase Class B Preferred stock directly via a Stock Purchase & Transfer Agreement at a stated $1.25 per share, $2,500 minimum, under Rule 506(c). This is NOT a SAFE and there is NO warrant and NO Guardian Badge — those belong to the separate Friends & Family Circle 35 (506(b)) round. Under 506(c), general solicitation is permitted but every investor's accredited status must be verified by the company (third-party letter, document review, or a verification service) — self-certification is not sufficient. Share structure: $10M pre-money context, 10,000,000 declared shares, Class A founder super-voting 15:1, Class B Preferred 1:1 voting and pari passu with Class A on economics, Class C common non-voting. Governing law Montana. Launch market New Orleans, 2026. Never give legal, tax, or investment advice — direct investors to their own advisors and to the official documents in the Document Center. If unsure, say so and point to brandon@musichabitat.com.";
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: sys,
          messages: next.map((m) => ({ role: m.role, content: m.content })),
        }),
      });
      const data = await res.json();
      const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n")
        || "I wasn't able to generate a response just now. Please try again, or email brandon@musichabitat.com.";
      setChat((c) => [...c, { role: "assistant", content: text }]);
    } catch (e) {
      setChat((c) => [...c, { role: "assistant", content: "Something went wrong reaching the assistant. Please try again in a moment, or email brandon@musichabitat.com." }]);
    } finally {
      setBusy(false);
    }
  };

  return (
    <Shell onBack={onBack}>
      <PPStep step={4} />
      <div style={{ paddingTop: 12 }}>
        <Kicker color={C.teal}>Get Your Questions Answered</Kicker>
        <H size={26}>Q&amp;A</H>
        <p style={{ color: C.textDim, fontSize: 13, margin: "6px 0 0" }}>
          Private Offering — priced Class B, Rule 506(c).
        </p>
      </div>

      {/* Category tabs */}
      <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 8 }}>
        {cats.map((c) => (
          <button key={c} onClick={() => { setCat(c); setOpen(null); }} style={{
            flex: 1, padding: "10px 0", borderRadius: 10, cursor: "pointer",
            fontFamily: FONT_DISPLAY, fontSize: 13, letterSpacing: 0.5, textTransform: "uppercase",
            background: cat === c ? C.teal : C.card, color: cat === c ? "#04252A" : C.textDim,
            border: `1px solid ${cat === c ? C.teal : C.line}`, fontWeight: 600,
          }}>{c}</button>
        ))}
      </div>

      <Card style={{ padding: "2px 16px" }}>
        {QA_PRIVATE[cat].map((item, i) => (
          <div key={i} style={{ borderBottom: i < QA_PRIVATE[cat].length - 1 ? `1px solid ${C.line}` : "none" }}>
            <div onClick={() => setOpen(open === i ? null : i)} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "14px 0", cursor: "pointer" }}>
              <span style={{ flex: 1, fontSize: 14, fontWeight: 500, color: C.text }}>{item.q}</span>
              <span style={{ color: C.teal, fontSize: 18, transform: open === i ? "rotate(45deg)" : "none",
                transition: "transform .2s" }}>+</span>
            </div>
            {open === i && (
              <p style={{ fontSize: 13, lineHeight: 1.6, color: C.textDim, margin: "0 0 14px", whiteSpace: "pre-wrap" }}>{item.a}</p>
            )}
          </div>
        ))}
      </Card>

      {/* AI assistant */}
      <Kicker color={C.teal}>Ask the Investor Assistant</Kicker>
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div ref={scroller} style={{ maxHeight: 300, overflowY: "auto", padding: 16 }}>
          {chat.length === 0 && (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <div style={{ width: 34, height: 34, borderRadius: "50%", flexShrink: 0,
                  background: `linear-gradient(135deg, ${C.tealDim}, ${C.amberDim})`,
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>💬</div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>Music Habitat Investor Assistant</div>
                  <div style={{ fontSize: 11, color: C.textFaint }}>Ask anything about the company or the investment</div>
                </div>
              </div>
              <p style={{ color: C.textDim, fontSize: 12.5, lineHeight: 1.5, margin: "0 0 12px" }}>
                I can explain the priced Class B purchase, Rule 506(c) and accreditation verification,
                the share classes, the market, or the team — in plain language. Tap a question to
                start, or type your own. Answers are informational only — not legal, tax, or
                investment advice.
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {[
                  "How is this different from the Circle 35?",
                  "What does buying priced Class B mean?",
                  "Why do you verify my accreditation?",
                  "What counts as an accredited investor?",
                  "What are my stockholder rights?",
                  "What's the market opportunity?",
                ].map((sq) => (
                  <button key={sq} onClick={() => ask(sq)} style={{
                    padding: "9px 12px", borderRadius: 18, cursor: "pointer", textAlign: "left",
                    background: C.card, color: C.text, border: `1px solid ${C.teal}55`,
                    fontSize: 12.5, lineHeight: 1.3, fontFamily: FONT_BODY }}>
                    {sq}
                  </button>
                ))}
              </div>
            </div>
          )}
          {chat.map((m, i) => (
            <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start",
              marginBottom: 10 }}>
              <div style={{ maxWidth: "82%", padding: "10px 13px", borderRadius: 12, fontSize: 13,
                lineHeight: 1.5, whiteSpace: "pre-wrap",
                background: m.role === "user" ? C.teal : C.cardHi,
                color: m.role === "user" ? "#04252A" : C.text,
                border: m.role === "user" ? "none" : `1px solid ${C.line}` }}>{m.content}</div>
            </div>
          ))}
          {busy && (
            <div style={{ display: "flex", justifyContent: "flex-start" }}>
              <div style={{ padding: "10px 13px", borderRadius: 12, background: C.cardHi,
                border: `1px solid ${C.line}`, color: C.textFaint, fontSize: 13 }}>Thinking…</div>
            </div>
          )}
          {chat.length > 0 && !busy && chat[chat.length - 1].role === "assistant" && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 4 }}>
              {[
                "Tell me more about the risks.",
                "How do I actually invest?",
                "How does verification work?",
              ].map((fq) => (
                <button key={fq} onClick={() => ask(fq)} style={{
                  padding: "7px 11px", borderRadius: 16, cursor: "pointer",
                  background: "transparent", color: C.teal, border: `1px solid ${C.teal}55`,
                  fontSize: 12, fontFamily: FONT_BODY }}>
                  {fq}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 8, padding: 12, borderTop: `1px solid ${C.line}` }}>
          <input value={input} onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") ask(); }}
            placeholder="Type your question…"
            style={{ flex: 1, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 10,
              padding: "11px 13px", color: C.text, fontSize: 14, outline: "none", fontFamily: FONT_BODY }} />
          <button onClick={() => ask()} disabled={busy} style={{ padding: "0 18px", borderRadius: 10,
            background: C.teal, color: "#04252A", border: "none", fontWeight: 700, fontSize: 14,
            cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, fontFamily: FONT_DISPLAY }}>
            Send
          </button>
        </div>
      </Card>

      <Btn variant="teal" onClick={() => go("pp_apply")}>Continue to Application</Btn>
    </Shell>
  );
}

// =============================================================================
// PP3 — Application + 506(c) accreditation verification
// =============================================================================
function PPApply({ go, onBack, papp, setPapp }) {
  const set = (k) => (v) => setPapp((a) => ({ ...a, [k]: v }));
  const amt = Number(papp.amount || 0);
  const validAmt = amt >= PRIVATE.minInvestment;
  // accreditedBasis is an array (multi-select): the investor may select one or more.
  const basis = Array.isArray(papp.accreditedBasis) ? papp.accreditedBasis : [];
  const toggleBasis = (k) => setPapp((a) => {
    const cur = Array.isArray(a.accreditedBasis) ? a.accreditedBasis : [];
    return { ...a, accreditedBasis: cur.includes(k) ? cur.filter((x) => x !== k) : [...cur, k] };
  });
  // 506(c): investor must select at least one accreditation basis AND a verification method.
  const canSubmit = papp.fullName && papp.email && validAmt &&
    basis.length > 0 && papp.verifyMethod;

  const BASES = [
    ["income",   "Income > $200K ($300K joint) in each of the last 2 years"],
    ["networth", "Net worth > $1M, excluding primary residence"],
    ["entity",   "Entity with > $5M in assets, or all equity owners accredited"],
    ["license",  "Hold a Series 7, 65, or 82 license in good standing"],
  ];
  const METHODS = [
    ["thirdparty", "Third-party letter (CPA, attorney, or broker-dealer)"],
    ["documents",  "Upload financial documents for review"],
    ["service",    "Use a verification service (e.g. Parallel Markets / VerifyInvestor)"],
    ["company",    "Company Review"],
  ];

  // Square checkbox for the multi-select accreditation basis.
  const Check = ({ active }) => (
    <div style={{ width: 18, height: 18, borderRadius: 5, flexShrink: 0, marginTop: 1,
      border: `1px solid ${active ? C.teal : C.lineHi}`,
      background: active ? C.teal : "transparent", display: "flex",
      alignItems: "center", justifyContent: "center", fontSize: 12, color: "#04252A" }}>
      {active ? "✓" : ""}
    </div>
  );

  const Radio = ({ active }) => (
    <div style={{ width: 18, height: 18, borderRadius: "50%", flexShrink: 0, marginTop: 1,
      border: `2px solid ${active ? C.teal : C.lineHi}`, display: "flex",
      alignItems: "center", justifyContent: "center" }}>
      {active && <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.teal }} />}
    </div>
  );

  return (
    <Shell onBack={onBack}>
      <PPStep step={5} />
      <div style={{ paddingTop: 12 }}>
        <Kicker color={C.teal}>Reserve Your Position</Kicker>
        <H size={26}>Investment Application</H>
        <p style={{ color: C.textDim, fontSize: 13, margin: "6px 0 16px" }}>
          This begins your subscription. Nothing is binding until you sign and fund.
        </p>
      </div>

      <Field label="Full legal name" value={papp.fullName} onChange={set("fullName")} placeholder="Jane Q. Investor" />
      <Field label="Email" value={papp.email} onChange={set("email")} placeholder="jane@email.com" />
      <Field label="Phone" value={papp.phone} onChange={set("phone")} placeholder="(555) 555-5555" />

      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "block", fontSize: 11, color: C.textFaint, textTransform: "uppercase",
          letterSpacing: 1, fontFamily: FONT_DISPLAY, marginBottom: 6 }}>Investment amount (USD)</label>
        <input value={papp.amount} onChange={(e) => set("amount")(e.target.value.replace(/[^0-9]/g, ""))}
          inputMode="numeric" placeholder={String(PRIVATE.minInvestment)}
          style={{ width: "100%", background: C.card,
            border: `1px solid ${validAmt || !papp.amount ? C.line : C.red}`,
            borderRadius: 10, padding: "13px 14px", color: C.text, fontSize: 16, outline: "none",
            fontFamily: FONT_BODY, boxSizing: "border-box" }} />
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
          <span style={{ fontSize: 11, color: C.textFaint }}>Minimum ${PRIVATE.minInvestment.toLocaleString()}</span>
          {papp.amount && !validAmt && <span style={{ fontSize: 11, color: C.red }}>Below minimum</span>}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          {[2500, 10000, 25000, 50000, 100000].map((v) => (
            <button key={v} onClick={() => set("amount")(String(v))} style={{
              padding: "8px 12px", borderRadius: 20, cursor: "pointer", fontFamily: FONT_DISPLAY,
              fontSize: 12, background: String(v) === papp.amount ? C.teal : C.card,
              color: String(v) === papp.amount ? "#04252A" : C.textDim,
              border: `1px solid ${String(v) === papp.amount ? C.teal : C.line}` }}>
              ${v.toLocaleString()}
            </button>
          ))}
        </div>
      </div>

      {/* Accreditation basis (506(c) — select one or more that apply) */}
      <Kicker color={C.teal}>I Qualify As Accredited Because…</Kicker>
      <div style={{ fontSize: 11, color: C.textFaint, margin: "-2px 4px 6px" }}>
        Select all that apply.
      </div>
      <Card style={{ padding: "4px 16px" }}>
        {BASES.map(([k, label], i, arr) => (
          <div key={k} onClick={() => toggleBasis(k)} style={{ display: "flex", gap: 10,
            padding: "12px 0", cursor: "pointer", alignItems: "flex-start",
            borderBottom: i < arr.length - 1 ? `1px solid ${C.line}` : "none" }}>
            <Check active={basis.includes(k)} />
            <span style={{ fontSize: 13, lineHeight: 1.45,
              color: basis.includes(k) ? C.text : C.textDim }}>{label}</span>
          </div>
        ))}
      </Card>

      {/* Verification method */}
      <Kicker color={C.teal}>How We'll Verify (Required Under 506(c))</Kicker>
      <Card style={{ padding: "4px 16px" }}>
        {METHODS.map(([k, label], i, arr) => (
          <div key={k} onClick={() => set("verifyMethod")(k)} style={{ display: "flex", gap: 10,
            padding: "12px 0", cursor: "pointer", alignItems: "flex-start",
            borderBottom: i < arr.length - 1 ? `1px solid ${C.line}` : "none" }}>
            <Radio active={papp.verifyMethod === k} />
            <span style={{ fontSize: 13, lineHeight: 1.45,
              color: papp.verifyMethod === k ? C.text : C.textDim }}>{label}</span>
          </div>
        ))}
        {/* BACKEND HOOK: integrate accreditation-verification provider; persist proof to investor record. */}
      </Card>
      <p style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.5, margin: "2px 4px 0" }}>
        Verification is completed before your subscription is accepted. Music Habitat must retain
        evidence of accredited status for each 506(c) investor.
      </p>

      <Btn variant="teal" onClick={() => canSubmit && go("pp_reserve")}
        style={{ opacity: canSubmit ? 1 : 0.5 }}>
        Continue
      </Btn>
      {!canSubmit && (
        <p style={{ textAlign: "center", color: C.textFaint, fontSize: 12, marginTop: 8 }}>
          Complete name, email, a valid amount, an accreditation basis, and a verification method.
        </p>
      )}
    </Shell>
  );
}

        </Card>
      ))}

      <Btn variant="teal" onClick={() => allChecked && go("pp_sign")}
        style={{ opacity: allChecked ? 1 : 0.5 }}>
        Continue to Signing
      </Btn>
      {!allChecked && (
        <p style={{ textAlign: "center", color: C.textFaint, fontSize: 12, marginTop: 8 }}>
          Confirm all acknowledgements to continue.
        </p>
      )}
    </Shell>
  );
}

// =============================================================================
// PP6 — E-Signature (priced-stock closing set)
// =============================================================================
function PPSign({ go, onBack, psigned, setPsigned, papp }) {
  const docs = PRIVATE.signDocs;
  const signedCount = docs.filter((d) => psigned[d.id]).length;
  const allSigned = signedCount === docs.length;

  const signOne = async (docId) => {
    const url = await getDocusignSigningUrl(docId, papp);
    if (url) { window.open(url, "_blank"); }
    setPsigned((s) => ({ ...s, [docId]: true }));
  };

  return (
    <Shell onBack={onBack}>
      <PPStep step={8} />
      <div style={{ paddingTop: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <DocuSignMark size={20} />
          <Kicker color={C.teal}>Secure E-Signature</Kicker>
        </div>
        <H size={26}>Sign Your Documents</H>
        <p style={{ color: C.textDim, fontSize: 13, margin: "6px 0 16px" }}>
          {signedCount} of {docs.length} signed. Each opens in a secure signing session.
        </p>
      </div>

      {docs.map((d) => (
        <Card key={d.id} style={{ display: "flex", alignItems: "center", gap: 12,
          borderColor: psigned[d.id] ? C.green : C.line }}>
          <div style={{ width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
            background: psigned[d.id] ? C.green : C.cardHi, display: "flex", alignItems: "center",
            justifyContent: "center", fontSize: 14, color: psigned[d.id] ? "#000" : C.textFaint }}>
            {psigned[d.id] ? "✓" : "✍"}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>{d.name}</div>
            <div style={{ fontSize: 11, color: psigned[d.id] ? C.green : C.textFaint,
              textTransform: "uppercase", letterSpacing: 0.5, marginTop: 2 }}>
              {psigned[d.id] ? "Signed" : "Awaiting signature"}
            </div>
          </div>
          {!psigned[d.id] && (
            <button onClick={() => signOne(d.id)} style={{ padding: "9px 16px", borderRadius: 8,
              background: C.teal, color: "#04252A", border: "none", fontWeight: 700, fontSize: 13,
              cursor: "pointer", fontFamily: FONT_DISPLAY }}>Sign</button>
          )}
        </Card>
      ))}

      {!DOCUSIGN.enabled && (
        <p style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.5, marginTop: 4 }}>
          {/* BACKEND HOOK: set DOCUSIGN.enabled + createEnvelopeEndpoint */}
          Demo signing flow. Connect DocuSign to enable legally-binding e-signature with audit trail.
        </p>
      )}

      <Btn variant="teal" onClick={() => allSigned && go("pp_fund")}
        style={{ opacity: allSigned ? 1 : 0.5 }}>
        Continue to Funding
      </Btn>
      {!allSigned && (
        <p style={{ textAlign: "center", color: C.textFaint, fontSize: 12, marginTop: 8 }}>
          Sign all documents to continue.
        </p>
      )}
    </Shell>
  );
}

// =============================================================================
// PP7 — Funding (wire / ACH) for the priced purchase
// =============================================================================
function PPFund({ go, onBack, papp }) {
  const [method, setMethod] = useState("wire");
  const amt = Number(papp.amount || PRIVATE.minInvestment);
  const [ach, setAch] = useState({
    holder: papp.fullName || "", acctType: "checking",
    routing: "", account: "", confirm: "", authorized: false,
  });
  const setA = (k) => (v) => setAch((s) => ({ ...s, [k]: v }));
  const routingValid = /^\d{9}$/.test(ach.routing);
  const accountValid = /^\d{4,17}$/.test(ach.account);
  const confirmMatch = ach.account.length > 0 && ach.account === ach.confirm;
  const achComplete = ach.holder.trim() && routingValid && accountValid && confirmMatch && ach.authorized;
  const [achSubmitted, setAchSubmitted] = useState(false);
  const submitAch = () => {
    if (!achComplete) return;
    // BACKEND HOOK: tokenize + authorize via FUNDING.achProcessorEndpoint.
    setAchSubmitted(true);
  };
  const methods = [
    { id: "wire", icon: "🏦", label: "Wire Transfer", sub: "Voice-verified · same-day" },
    { id: "ach", icon: "💳", label: "ACH Transfer", sub: "1–3 business days" },
    { id: "check", icon: "✉️", label: "Certified Check", sub: "By mail" },
  ];

  const fld = (label, value, onChange, props = {}) => (
    <div style={{ marginBottom: 12 }}>
      <label style={{ display: "block", fontSize: 11, color: C.textFaint, textTransform: "uppercase",
        letterSpacing: 1, fontFamily: FONT_DISPLAY, marginBottom: 6 }}>{label}</label>
      <input value={value} onChange={(e) => onChange(e.target.value)} {...props}
        style={{ width: "100%", background: C.card, border: `1px solid ${C.line}`, borderRadius: 10,
          padding: "13px 14px", color: C.text, fontSize: 15, outline: "none",
          fontFamily: FONT_BODY, boxSizing: "border-box" }} />
    </div>
  );

  return (
    <Shell onBack={onBack}>
      <PPStep step={9} />
      <div style={{ paddingTop: 12 }}>
        <Kicker color={C.teal}>Final Step</Kicker>
        <H size={26}>Fund Your Investment</H>
        <p style={{ color: C.textDim, fontSize: 13, margin: "6px 0 16px" }}>
          Funding ${amt.toLocaleString()} for your {PRIVATE.shareClass} purchase.
        </p>
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        {methods.map((m) => (
          <Card key={m.id} onClick={() => setMethod(m.id)} style={{ flex: 1, textAlign: "center",
            cursor: "pointer", marginBottom: 0, borderColor: method === m.id ? C.teal : C.line }}>
            <div style={{ fontSize: 22 }}>{m.icon}</div>
            <div style={{ fontSize: 13, fontWeight: 600, marginTop: 6,
              color: method === m.id ? C.teal : C.text }}>{m.label}</div>
            <div style={{ fontSize: 10, color: C.textFaint, marginTop: 2 }}>{m.sub}</div>
          </Card>
        ))}
      </div>

      {method === "wire" && (
        <Card style={{ padding: "4px 16px" }}>
          {/* BACKEND HOOK: deliver real wire details out-of-band, voice-verified. */}
          {[
            ["Beneficiary", FUNDING.beneficiary],
            ["Bank", FUNDING.bankName],
            ["Routing", FUNDING.routing],
            ["Account", FUNDING.account],
            ["Amount", `$${amt.toLocaleString()}`],
          ].map(([k, v], i, arr) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 14,
              padding: "11px 0", borderBottom: i < arr.length - 1 ? `1px solid ${C.line}` : "none",
              fontSize: 13 }}>
              <span style={{ color: C.textFaint }}>{k}</span>
              <span style={{ color: C.text, textAlign: "right" }}>{v}</span>
            </div>
          ))}
        </Card>
      )}

      {method === "wire" && (
        <p style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.5, margin: "10px 4px 0" }}>
          For security, final wire instructions are confirmed by phone before you send funds. Never
          wire to details received only by email.
        </p>
      )}

      {method === "ach" && !achSubmitted && (
        <div>
          {fld("Account holder name", ach.holder, setA("holder"), { placeholder: "Jane Q. Investor" })}
          {fld("Routing number", ach.routing, (v) => setA("routing")(v.replace(/[^0-9]/g, "")),
            { inputMode: "numeric", placeholder: "9 digits" })}
          {fld("Account number", ach.account, (v) => setA("account")(v.replace(/[^0-9]/g, "")),
            { inputMode: "numeric", placeholder: "Account number" })}
          {fld("Confirm account number", ach.confirm, (v) => setA("confirm")(v.replace(/[^0-9]/g, "")),
            { inputMode: "numeric", placeholder: "Re-enter account number" })}
          {ach.confirm && !confirmMatch && (
            <p style={{ fontSize: 11, color: C.red, margin: "-6px 4px 10px" }}>Account numbers do not match.</p>
          )}
          <Card onClick={() => setA("authorized")(!ach.authorized)} style={{ display: "flex", gap: 12,
            cursor: "pointer", alignItems: "flex-start" }}>
            <div style={{ width: 20, height: 20, borderRadius: 5, flexShrink: 0, marginTop: 1,
              border: `1px solid ${ach.authorized ? C.green : C.lineHi}`,
              background: ach.authorized ? C.green : "transparent", display: "flex",
              alignItems: "center", justifyContent: "center", fontSize: 12, color: "#000" }}>
              {ach.authorized ? "✓" : ""}
            </div>
            <span style={{ fontSize: 12.5, lineHeight: 1.5, color: C.textDim }}>
              I authorize Music Habitat, Inc. to initiate a one-time ACH debit of ${amt.toLocaleString()}
              {" "}from the account above for my Class B Preferred purchase.
            </span>
          </Card>
          <Btn variant="teal" onClick={submitAch} style={{ opacity: achComplete ? 1 : 0.5 }}>
            Authorize ACH Debit
          </Btn>
          <p style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.5, margin: "8px 4px 0" }}>
            {/* BACKEND HOOK: tokenize via FUNDING.achProcessorEndpoint (Plaid/Stripe). */}
            Bank details are tokenized by a secure processor. Music Habitat never stores your raw
            account number.
          </p>
        </div>
      )}

      {method === "ach" && achSubmitted && (
        <Card style={{ borderColor: C.green, textAlign: "center" }}>
          <div style={{ fontSize: 28 }}>✅</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: C.green, marginTop: 6 }}>
            ACH authorization received
          </div>
          <p style={{ fontSize: 12.5, color: C.textDim, lineHeight: 1.5, margin: "6px 0 0" }}>
            Your debit will process in 1–3 business days. You'll receive confirmation by email.
          </p>
        </Card>
      )}

      {method === "check" && (
        <Card style={{ padding: "4px 16px" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.teal, marginBottom: 10 }}>
            Mail a Certified Check
          </div>
          {[["Payable to", FUNDING.checkPayee], ["Mail to", FUNDING.checkAddress],
            ["Amount", `$${amt.toLocaleString()}`]].map(([k, v], i, arr) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 14,
              padding: "11px 0", borderBottom: i < arr.length - 1 ? `1px solid ${C.line}` : "none",
              fontSize: 13 }}>
              <span style={{ color: C.textFaint }}>{k}</span>
              <span style={{ color: C.text, textAlign: "right", maxWidth: "60%" }}>{v}</span>
            </div>
          ))}
          <p style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.5, margin: "10px 0 2px" }}>
            Make the check payable as shown. Your position is confirmed once the check clears and
            the Company accepts your subscription.
          </p>
        </Card>
      )}

      <Btn variant="teal"
        onClick={() => (method === "wire" || method === "check" || achSubmitted) && go("pp_welcome")}
        style={{ opacity: (method === "wire" || method === "check" || achSubmitted) ? 1 : 0.5, marginTop: 14 }}>
        {method === "ach" ? "Complete" : "I've Initiated Funding"}
      </Btn>
    </Shell>
  );
}

// =============================================================================
// PP8 — Welcome / Confirmation (priced Class B — General certificate)
// =============================================================================
function PPWelcome({ go, onBack, papp }) {
  const amt = Number(papp.amount || PRIVATE.minInvestment);
  const shares = Math.floor(amt / PRIVATE.pricePerShare);
  return (
    <Shell onBack={onBack}>
      <PPStep step={10} />
      <div style={{ paddingTop: 24, textAlign: "center" }}>
        <div style={{ fontSize: 44 }}>🏛</div>
        <Kicker color={C.teal}>Subscription Received</Kicker>
        <H size={30} accent={C.teal}>Thank You.</H>
        <p style={{ color: C.text, fontSize: 15, lineHeight: 1.6, margin: "12px 0 0" }}>
          {papp.fullName ? `${papp.fullName}, your` : "Your"} subscription to the Music Habitat
          Private Offering has been received. Once your accredited status is verified and funds
          clear, your {PRIVATE.shareClass} shares will be issued and your certificate delivered.
        </p>
      </div>

      <Card style={{ marginTop: 24, textAlign: "left", padding: "6px 16px" }}>
        {[
          ["Security", PRIVATE.shareClass],
          ["Your investment", `$${amt.toLocaleString()}`],
          ["Est. shares", `${shares.toLocaleString()} @ $${PRIVATE.pricePerShare.toFixed(2)}`],
          ["Accreditation", "Verification in progress"],
          ["What's next", "Verification → funds clear → shares issued"],
        ].map(([k, v], i, arr) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", gap: 12,
            padding: "11px 0", borderBottom: i < arr.length - 1 ? `1px solid ${C.line}` : "none",
            fontSize: 13 }}>
            <span style={{ color: C.textFaint }}>{k}</span>
            <span style={{ color: C.text, textAlign: "right", maxWidth: "60%" }}>{v}</span>
          </div>
        ))}
      </Card>

      {/* Stock certificate visual — Class B Preferred · General (priced track) */}
      <div style={{ marginTop: 22 }}>
        <div style={{ fontSize: 11, color: C.textFaint, letterSpacing: 1.5,
          textTransform: "uppercase", fontFamily: FONT_DISPLAY, textAlign: "center",
          marginBottom: 10 }}>
          Your Stock Certificate
        </div>
        <div style={{ borderRadius: 12, overflow: "hidden", border: `1px solid ${C.line}`,
          background: "#FBFAF6" }}>
          {/* BACKEND HOOK: swap to the Class B General certificate artwork when available.
              Shares the Class B Preferred certificate base; the class line below reads "General". */}
          <img src={STOCK_CERT_IMG} alt="Music Habitat Class B Preferred Stock Certificate — General"
            style={{ width: "100%", display: "block" }} />
        </div>
        <div style={{ fontSize: 11, color: C.textFaint, lineHeight: 1.5, textAlign: "center",
          marginTop: 8 }}>
          Class B Preferred · General. Issued upon close — final share count, certificate number,
          and issue date are completed when your subscription is accepted and verified.
        </div>
      </div>

      <Card style={{ marginTop: 14, borderColor: C.tealDim, display: "flex", gap: 12,
        alignItems: "flex-start" }}>
        <span style={{ fontSize: 20, flexShrink: 0 }}>📩</span>
        <p style={{ fontSize: 12.5, lineHeight: 1.5, color: C.textDim, margin: 0 }}>
          A member of the team will reach out to complete verification and confirm wire receipt.
          Questions? Email <span style={{ color: C.teal }}>brandon@musichabitat.com</span>.
        </p>
      </Card>

      <Btn variant="teal" onClick={() => go("pp_call")}>Next</Btn>
      <Btn variant="ghost" onClick={() => go("page1")}>Back to Portal Home</Btn>
    </Shell>
  );
}

// =============================================================================
// PP10 — Schedule the founder call (Private · Calendly hook)
// =============================================================================
function PPCall({ go, onBack, papp }) {
  const openCalendly = () => {
    if (CALENDLY_URL) {
      window.open(CALENDLY_URL, "_blank", "noopener,noreferrer");
    } else {
      // BACKEND HOOK: set CALENDLY_URL; until then, fall back to email.
      window.location.href =
        `mailto:brandon@musichabitat.com?subject=${encodeURIComponent("Private Offering founder call — " + (papp.fullName || "Investor"))}`;
    }
  };
  return (
    <Shell onBack={onBack}>
      <PPStep step={11} />
      <div style={{ paddingTop: 18, textAlign: "center" }}>
        <div style={{ fontSize: 38 }}>📞</div>
        <Kicker color={C.teal}>One Last Thing</Kicker>
        <H size={28}>Talk With Brandon</H>
        <p style={{ color: C.textDim, fontSize: 14, lineHeight: 1.6, margin: "10px 0 0" }}>
          We'd welcome a personal call with the founder to answer any remaining questions. If you'd
          like one, schedule a time that works for you — or skip for now and book it later.
        </p>
      </div>

      <Card style={{ marginTop: 22, textAlign: "center", padding: "26px 20px" }}>
        <div style={{ fontSize: 26, marginBottom: 12 }}>🗓</div>
        <p style={{ color: C.textDim, fontSize: 14, lineHeight: 1.6, margin: "0 0 18px" }}>
          Tap below to open Brandon's calendar and pick a time. It opens in a new tab so you
          won't lose your place here.
        </p>
        <Btn variant="teal" onClick={openCalendly}>Schedule With Brandon</Btn>
      </Card>

      <Btn variant="ghost" onClick={() => go("page1")}>Skip for Now</Btn>
    </Shell>
  );
}


// =============================================================================
// APP — router
// =============================================================================
function App() {
  const [route, setRoute] = useState("page1");
  const [read, setRead] = useState({});
  const [app, setApp] = useState({ fullName: "", email: "", phone: "", amount: "", accredited: false });
  const [acks, setAcks] = useState({});
  const [signed, setSigned] = useState({});
  // Private (506(c)) track state — kept separate from the F&F application state.
  const [papp, setPapp] = useState({ fullName: "", email: "", phone: "", amount: "",
    accreditedBasis: [], verifyMethod: "" });
  const [packs, setPacks] = useState({});
  const [psigned, setPsigned] = useState({});
  // NDA acceptance, recorded per track. BACKEND HOOK: persist name + timestamp.
  const [ndaSigned, setNdaSigned] = useState({ ff: false, private: false });

  const go = (r) => { setRoute(r); if (typeof window !== "undefined") window.scrollTo(0, 0); };
  const markRead = (id) => setRead((r) => ({ ...r, [id]: true }));

  // Executive Summary opens its own full reader (public, from Page 1).
  if (route === "execsum_reader") return <ExecSummaryView onBack={() => go("page1")} />;

  // Document viewer routes: "doc_view:<id>"
  if (route.startsWith("doc_view:")) {
    const docId = route.slice("doc_view:".length);
    return <DocViewer docId={docId} onBack={() => go("page5")} />;
  }

  switch (route) {
    case "page1":
      return <Page1 go={go} openExecSummary={() => go("execsum_reader")} />;
    case "gate_ff":
      return <GatePage title="Friends & Family" accent={C.amber}
        onSuccess={() => go("nda_ff")} onBack={() => go("page1")} />;
    case "nda_ff":
      return <NDAGate accent={C.amber} trackLabel="the Circle 35 Friends & Family offering"
        onAccept={() => { setNdaSigned((s) => ({ ...s, ff: true })); go("page2"); }}
        onBack={() => go("gate_ff")} />;
    case "gate_private":
      return <GatePage title="Private Offering" accent={C.teal}
        onSuccess={() => go("nda_private")} onBack={() => go("page1")} />;
    case "nda_private":
      return <NDAGate accent={C.teal} trackLabel="the Music Habitat Private Offering"
        onAccept={() => { setNdaSigned((s) => ({ ...s, private: true })); go("pp_welcome_ceo"); }}
        onBack={() => go("gate_private")} />;
    case "pp_welcome_ceo":
      return <PPWelcomeCEO go={go} onBack={() => go("page1")} />;
    case "pp_overview":
      return <PPOverview go={go} onBack={() => go("pp_welcome_ceo")} />;
    case "pp_docs":
      return <PPDocs go={go} onBack={() => go("pp_overview")} read={read} markRead={markRead} />;
    case "pp_qa":
      return <PPQA go={go} onBack={() => go("pp_docs")} />;
    case "pp_apply":
      return <PPApply go={go} onBack={() => go("pp_qa")} papp={papp} setPapp={setPapp} />;
    case "pp_reserve":
      return <PPReserve go={go} onBack={() => go("pp_apply")} papp={papp} />;
    case "pp_ack":
      return <PPAck go={go} onBack={() => go("pp_reserve")} packs={packs} setPacks={setPacks} />;
    case "pp_sign":
      return <PPSign go={go} onBack={() => go("pp_ack")} psigned={psigned} setPsigned={setPsigned} papp={papp} />;
    case "pp_fund":
      return <PPFund go={go} onBack={() => go("pp_sign")} papp={papp} />;
    case "pp_welcome":
      return <PPWelcome go={go} onBack={() => go("pp_fund")} papp={papp} />;
    case "pp_call":
      return <PPCall go={go} onBack={() => go("pp_welcome")} papp={papp} />;
    case "page2":  return <Page2 go={go} onBack={() => go("page1")} />;
    case "page3":  return <Page3 go={go} onBack={() => go("page2")} />;
    case "page4":  return <Page4 go={go} onBack={() => go("page3")} />;
    case "page5":  return <Page5 go={go} onBack={() => go("page4")} read={read} markRead={markRead} />;
    case "page6":  return <Page6 go={go} onBack={() => go("page5")} />;
    case "page7":  return <Page7 go={go} onBack={() => go("page6")} app={app} setApp={setApp} />;
    case "page8":  return <Page8 go={go} onBack={() => go("page7")} app={app} />;
    case "page9":  return <Page9 go={go} onBack={() => go("page8")} acks={acks} setAcks={setAcks} />;
    case "page10": return <Page10 go={go} onBack={() => go("page9")} signed={signed} setSigned={setSigned} app={app} />;
    case "page11": return <Page11 go={go} onBack={() => go("page10")} app={app} />;
    case "page12": return <Page12 go={go} onBack={() => go("page11")} app={app} />;
    case "page13": return <Page13 go={go} onBack={() => go("page12")} app={app} />;
    default:
      return <Page1 go={go} openExecSummary={() => go("execsum_reader")} />;
  }
}


const rootEl = document.getElementById("root");
const boot = document.getElementById("boot");
if (boot) boot.remove();
ReactDOM.createRoot(rootEl).render(React.createElement(App));
</script>
</body>
